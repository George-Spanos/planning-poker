version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: "gomod"
    directory: "/api"
    schedule:
      interval: "monthly"
    groups:
      go-deps:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "monthly"
    groups:
      npm-deps:
        patterns:
          - "*"
