name: UI
on:
  push:
    branches:
      - "main"
    paths:
      - "ui/**"
      - "e2e/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-24.04
    environment: prod
    steps:
      - uses: actions/checkout@v6
      - name: Test ui
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from e2e
  build:
    runs-on: ubuntu-24.04
    needs: test
    environment: prod
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 'Create env file'
        run: |
          echo "${{ vars.UI_ENV }}" > ui/.env.production
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.CONTAINER_USERNAME }}
          password: ${{ secrets.CONTAINER_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.REPOSITORY_NAME }}/planning-poker-ui:${{ github.sha }},${{ secrets.REPOSITORY_NAME }}/planning-poker-ui:latest
          context: ./ui